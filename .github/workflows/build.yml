name: Build and publish extensions

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build all extensions
        run: gradle make

      # ফাইলগুলো builds ব্রাঞ্চে পুশ করার জন্য অফিশিয়াল আউটপুট ডিরেক্টরি
      - name: Publish to builds branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: build/output # ক্লাউডস্ট্রিম বিল্ডের আসল ফোল্ডার পাথ
          clean: true
