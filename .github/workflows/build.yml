name: Build and publish extensions

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive' # সাব-মডিউল থাকলে তা লোড করার জন্য

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # অফিশিয়াল কমান্ড দিয়ে সম্পূর্ণ বিল্ড ও JSON জেনারেট করা
      - name: Build all extensions
        run: |
          chmod +x gradlew || true
          gradle makeMake make

      # ফাইলগুলো builds ব্রাঞ্চে নিরাপদে ডেপ্লয় করা
      - name: Publish to builds branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: build # যদি ভুল ফোল্ডার পুশ হয়, তবে এখানে 'artifacts' লিখে ট্রাই করবেন
          clean: true
