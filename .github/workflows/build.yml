name: Build and publish extensions

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # শুধু 'gradle make' রান করা হবে যা আপনার প্রোজেক্টে অলরেডি কাজ করছিল
      - name: Build all extensions
        run: gradle make

      # JamesIves অ্যাকশন ব্যবহার করে নিখুঁতভাবে builds ব্রাঞ্চে পুশ করা
      - name: Publish to builds branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: build # gradle make এর পর সব ফাইল এই ফোল্ডারে জমা হয়
          clean: true
