name: Build and publish extensions

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# গিটহাব অ্যাকশনকে builds ব্রাঞ্চে ফাইল লেখার সরাসরি পারমিশন দেওয়া হলো
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build all extensions
        run: gradle make

      # ফাইলগুলো ঠিক কোথায় তৈরি হচ্ছে তা অ্যাকশন লগে দেখার জন্য (Debugging)
      - name: List files for verification
        run: |
          echo "=== Root Files ==="
          ls -la
          echo "=== Build Files ==="
          ls -la build || true

      # পুরো রুট ডিরেক্টরি থেকে জেনারেট হওয়া ফাইল খুঁজে নিয়ে builds ব্রাঞ্চে পুশ করা
      - name: Publish to builds branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: . # রুট ফোল্ডার সিলেক্ট করা হলো যাতে ফাইল মিস না হয়
          clean: false # আগের বিল্ড রিপোর্ট যেন ডিলিট না হয়
